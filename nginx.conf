server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle /shanchuang-space path
    location /shanchuang-space {
        alias /usr/share/nginx/html/shanchuang-space;
        try_files $uri $uri/ /shanchuang-space/index.html;
    }

    # API proxy to backend
    location /v1 {
        proxy_pass https://api.chatfire.site;
        proxy_set_header Host api.chatfire.site;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # 本地媒体缓存（需与 Node server/index.mjs 同机，默认 127.0.0.1:8787）
    location /api/media/ {
        proxy_pass http://127.0.0.1:8787/api/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 200m;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
